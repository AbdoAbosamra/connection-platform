name: Deploy to VPS

# Runs after code lands on main, or manually from the Actions tab.
# It is SAFE to merge before configuring the server: if the SSH secrets
# are missing the job logs a warning and exits green (it deploys nothing).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once — a newer push cancels an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & ship to server
    runs-on: ubuntu-latest
    steps:
      # 1) Decide whether we can deploy. If the required secrets are not set,
      #    every later step is skipped and the job still passes (no red X).
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_KEY }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy secrets not configured — skipping deploy. Add SSH_HOST, SSH_USER, SSH_KEY, DEPLOY_PATH (and optional SSH_PORT) under Settings → Secrets and variables → Actions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.check.outputs.ready == 'true'
        uses: actions/checkout@v4

      # 2) Build the production frontend bundle on the runner (not the server).
      - name: Setup Node
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.check.outputs.ready == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 3) Load the private SSH key into the runner so we can reach the server.
      - name: Configure SSH
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # 4) Copy the built frontend to the server (mirror, removing stale files).
      - name: Upload frontend build
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            frontend/dist/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/frontend/dist/"

      # 5) Update the backend ON the server: pull code, install prod deps,
      #    run migrations, and rebuild Laravel's caches.
      - name: Deploy backend
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        # $DEPLOY_PATH is expanded here on the runner; the remaining lines run
        # on the server. --force lets migrations run non-interactively in prod.
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$DEPLOY_PATH/backend'
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
          "

      - name: Done
        if: steps.check.outputs.ready == 'true'
        run: echo "✅ Deployed commit ${{ github.sha }} to $DEPLOY_PATH"
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
