; ─────────────────────────────────────────────────────────────────────────────
; RemoteArena — PHP per-directory configuration
;
; Applies automatically when running under PHP-FPM or Apache mod_php.
;
; ⚠️  For "php artisan serve" (PHP built-in CLI server) this file is NOT read.
;     Instead start the server with explicit flags:
;
;     php -d post_max_size=25M -d upload_max_filesize=15M -d memory_limit=256M artisan serve
;
;     Or add these values to your system php.ini:
;     Run:  php --ini          ← shows the loaded php.ini path
; ─────────────────────────────────────────────────────────────────────────────

; Maximum size of the entire POST body (must be LARGER than upload_max_filesize)
post_max_size = 25M

; Maximum size of a single uploaded file
upload_max_filesize = 15M

; PHP process memory ceiling (must be >= post_max_size)
memory_limit = 256M

; Maximum execution time in seconds (large uploads can be slow on poor connections)
max_execution_time = 120

; Maximum time to receive the request body
max_input_time = 120
